<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "gradient-end": "#8B5CF6",
                    "error-container": "#ffdad6",
                    "text-primary": "#1F2937",
                    "surface-container-low": "#f2f3fd",
                    "warning": "#F59E0B",
                    "primary-fixed": "#d8e2ff",
                    "on-secondary-fixed-variant": "#5516be",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#004395",
                    "tertiary-container": "#b75b00",
                    "background-page": "#F3F4F6",
                    "on-primary-container": "#fefcff",
                    "surface-dim": "#d8d9e3",
                    "on-error": "#ffffff",
                    "inverse-primary": "#adc6ff",
                    "inverse-surface": "#2e3038",
                    "surface-container-high": "#e6e7f2",
                    "outline-variant": "#c2c6d6",
                    "surface-card": "#FFFFFF",
                    "surface": "#f9f9ff",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-fixed": "#001a42",
                    "on-tertiary-fixed-variant": "#723600",
                    "secondary-fixed": "#e9ddff",
                    "secondary-container": "#8455ef",
                    "error": "#EF4444",
                    "secondary-fixed-dim": "#d0bcff",
                    "primary-container": "#2170e4",
                    "success": "#10B981",
                    "on-surface-variant": "#424754",
                    "secondary": "#6b38d4",
                    "tertiary": "#924700",
                    "tertiary-fixed-dim": "#ffb786",
                    "on-surface": "#191b23",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#005ac2",
                    "on-secondary-container": "#fffbff",
                    "on-secondary-fixed": "#23005c",
                    "primary-fixed-dim": "#adc6ff",
                    "gradient-start": "#3B82F6",
                    "on-primary": "#ffffff",
                    "on-background": "#191b23",
                    "surface-bright": "#f9f9ff",
                    "inverse-on-surface": "#eff0fa",
                    "background": "#f9f9ff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed": "#ffdcc6",
                    "surface-variant": "#e1e2ec",
                    "text-secondary": "#6B7280",
                    "primary": "#0058be",
                    "surface-container": "#ecedf7",
                    "surface-container-highest": "#e1e2ec",
                    "outline": "#727785",
                    "on-tertiary-fixed": "#311400",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "16px",
                    "full": "9999px"
            },
            "spacing": {
                    "component-gap": "16px",
                    "page-margin": "16px",
                    "section-padding": "20px",
                    "tab-bar-height": "60px",
                    "card-gutter": "12px"
            },
            "fontFamily": {
                    "body-secondary": ["Lexend"],
                    "stat-number": ["Lexend"],
                    "body-main": ["Lexend"],
                    "label-bold": ["Lexend"],
                    "headline-card": ["Lexend"],
                    "button-lg": ["Lexend"],
                    "nav-title": ["Lexend"]
            },
            "fontSize": {
                    "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "stat-number": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "headline-card": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "button-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "nav-title": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #F9F9FF;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-switch {
            background-color: #3B82F6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen text-text-primary">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-gradient-to-r from-[#3B82F6] to-[#8B5CF6] text-white shadow-lg">
<div class="flex items-center gap-4 w-full">
<button class="active:scale-95 transition-transform flex items-center justify-center w-10 h-10 hover:bg-white/10 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Lexend'] font-semibold text-lg text-white">设置</h1>
</div>
</header>
<main class="pt-20 pb-24 px-4 max-w-md mx-auto space-y-4">
<!-- 数据管理模块 -->
<section class="bg-surface-card rounded-2xl p-section-padding shadow-sm">
<div class="flex items-center gap-3 mb-4">
<div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-[#3B82F6]">
<span class="material-symbols-outlined" data-icon="database">database</span>
</div>
<h2 class="font-headline-card text-headline-card">数据管理</h2>
</div>
<div class="grid grid-cols-2 gap-card-gutter">
<button class="bg-surface-container-low text-[#3B82F6] font-label-bold text-label-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-blue-100 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="upload">upload</span>
                    导出数据
                </button>
<button class="bg-surface-container-low text-[#3B82F6] font-label-bold text-label-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-blue-100 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="download">download</span>
                    导入数据
                </button>
</div>
<p class="mt-3 text-text-secondary font-body-secondary text-body-secondary">
                您可以备份您的学习记录或从其他设备同步进度。
            </p>
</section>
<!-- 学习设置模块 -->
<section class="bg-surface-card rounded-2xl p-section-padding shadow-sm">
<div class="flex items-center gap-3 mb-4">
<div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center text-[#8B5CF6]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
<h2 class="font-headline-card text-headline-card">学习设置</h2>
</div>
<div class="space-y-4">
<!-- 音效反馈 -->
<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
<span class="font-body-main text-body-main">音效反馈</span>
<button class="relative inline-flex h-6 w-11 items-center rounded-full active-switch">
<span class="inline-block h-4 w-4 transform rounded-full bg-white transition translate-x-6"></span>
</button>
</div>
<!-- 每次练习题目数 -->
<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
<span class="font-body-main text-body-main">每次练习题目数</span>
<div class="relative">
<select class="appearance-none bg-surface-container-low text-[#3B82F6] font-label-bold text-label-bold py-1 px-4 pr-8 rounded-lg border-none focus:ring-2 focus:ring-primary-container">
<option>10 题</option>
<option>20 题</option>
<option>50 题</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[18px] pointer-events-none text-[#3B82F6]" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- 每日学习目标 -->
<div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
<span class="font-body-main text-body-main">每日学习目标</span>
<div class="relative">
<select class="appearance-none bg-surface-container-low text-[#3B82F6] font-label-bold text-label-bold py-1 px-4 pr-8 rounded-lg border-none focus:ring-2 focus:ring-primary-container">
<option>10 题</option>
<option>30 题</option>
<option>50 题</option>
<option>100 题</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[18px] pointer-events-none text-[#3B82F6]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</section>
<!-- 关于模块 -->
<section class="bg-surface-card rounded-2xl p-section-padding shadow-sm">
<h2 class="font-headline-card text-headline-card mb-4">关于</h2>
<div class="flex flex-col items-center py-6">
<div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-[#3B82F6] to-[#8B5CF6] flex items-center justify-center shadow-md mb-4">
<span class="material-symbols-outlined text-white text-4xl" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<h3 class="font-label-bold text-body-main text-text-primary">新启航英语学习系统</h3>
<p class="font-body-secondary text-body-secondary text-text-secondary mt-1">版本 v1.0</p>
</div>
<div class="space-y-3 mt-4 border-t border-gray-50 pt-4">
<div class="flex items-center justify-between font-body-secondary text-body-secondary text-text-secondary">
<span>用户协议</span>
<span class="material-symbols-outlined text-[18px]" data-icon="chevron_right">chevron_right</span>
</div>
<div class="flex items-center justify-between font-body-secondary text-body-secondary text-text-secondary">
<span>隐私政策</span>
<span class="material-symbols-outlined text-[18px]" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</section>
<!-- Exit Action Button -->
<button class="w-full h-[60px] bg-gradient-to-r from-[#3B82F6] to-[#8B5CF6] rounded-xl text-white font-button-lg text-button-lg shadow-md hover:opacity-90 active:scale-95 transition-all mt-4">
            保存并返回
        </button>
</main>
<!-- BottomNavBar from JSON - "我的" (Person) is Active -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-[60px] px-4 bg-white dark:bg-gray-900 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] border-t border-gray-100 dark:border-gray-800">
<button class="flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform hover:bg-gray-50 dark:hover:bg-gray-800 flex-1 h-full">
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500" data-icon="home">home</span>
<span class="font-['Lexend'] text-[12px] font-medium text-gray-400 dark:text-gray-500">首页</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform hover:bg-gray-50 dark:hover:bg-gray-800 flex-1 h-full">
<span class="material-symbols-outlined text-gray-400 dark:text-gray-500" data-icon="menu_book">menu_book</span>
<span class="font-['Lexend'] text-[12px] font-medium text-gray-400 dark:text-gray-500">学习</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform hover:bg-gray-50 dark:hover:bg-gray-800 flex-1 h-full">
<span class="material-symbols-outlined text-[#3B82F6] font-bold" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Lexend'] text-[12px] font-bold text-[#3B82F6]">我的</span>
</button>
</nav>
</body></html>
