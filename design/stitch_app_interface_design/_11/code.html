<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>自然拼读 - 新启航英语</title>

                        "on-tertiary-fixed-variant": "#723600",

                    },

                    "spacing": {

                        "body-main": ["Lexend"],
                        "label-bold": ["Lexend"]
                    },
                    "fontSize": {
                        "stat-number": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "button-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "nav-title": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-card": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],

            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #F3F4F6;
        }
        .header-gradient {
            background: linear-gradient(135deg, #4F6EF2 0%, #976CF0 100%);
        }
        .active-letter-gradient {
            background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Top Header Area -->
<header class="header-gradient pt-4 pb-16 px-6 text-white rounded-b-[40px] relative z-10">
<div class="flex justify-between items-center mb-6">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined cursor-pointer text-2xl">menu</span>
<h1 class="text-xl font-bold font-lexend">自然拼读</h1>
</div>
<div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">notifications</span>
</div>
</div>
<div class="mb-2">
<p class="text-sm opacity-80">继续加油，同学！</p>
<div class="flex justify-between items-end">
<h2 class="text-3xl font-bold mt-1">学习进度</h2>
<span class="text-4xl font-bold">3%</span>
</div>
</div>
<div class="w-full bg-white/20 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-white h-full" style="width: 3.84%;"></div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 -mt-8 px-5 pb-24 relative z-20">
<!-- Progress Card -->
<section class="bg-white rounded-xl p-5 mb-6 shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
<div class="flex justify-between items-start mb-6">
<div>
<h3 class="text-lg font-bold text-gray-800">1 / 26 字母</h3>
<p class="text-sm text-gray-400 font-lexend">Phonics Progress</p>
</div>
<div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<div class="flex items-center gap-6">
<!-- Circular Progress -->
<div class="relative w-20 h-20">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-gray-100" cx="40" cy="40" fill="transparent" r="34" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-blue-500" cx="40" cy="40" fill="transparent" r="34" stroke="currentColor" stroke-dasharray="213.6" stroke-dashoffset="205.4" stroke-width="6"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="text-[14px] font-bold text-gray-800">1/26</span>
<span class="text-[8px] text-gray-400">DONE</span>
</div>
</div>
<div class="flex-1">
<p class="text-sm text-gray-600 leading-relaxed">
                        继续加油！完成 A 的学习，离目标更近一步。
                    </p>
</div>
</div>
</section>
<!-- Letter Grid -->
<div class="grid grid-cols-4 gap-4 mb-6">
<!-- Active/Completed Card (A) -->
<div class="aspect-square active-letter-gradient rounded-xl flex flex-col items-center justify-center text-white shadow-lg active:scale-95 transition-all">
<span class="font-lexend font-bold text-2xl">A a</span>
<span class="text-[10px] opacity-90 mt-1 font-medium">Apple</span>
</div>
<!-- Inactive Cards (B-Z) -->
<script>
                const alphabet = "BCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
                const exampleWords = ["Bear", "Cat", "Dog", "Egg", "Fish", "Goat", "Hat", "Igloo", "Jam", "Kite", "Lion", "Moon", "Net", "Owl", "Pig", "Queen", "Rat", "Sun", "Tiger", "Up", "Van", "Wolf", "Xylophone", "Yo-yo", "Zebra"];
                
                alphabet.forEach((letter, index) => {
                    document.write(`
                        <div class="aspect-square bg-white rounded-xl flex flex-col items-center justify-center text-gray-700 shadow-[0_2px_10px_rgba(0,0,0,0.03)] active:scale-95 transition-all">
                            <span class="font-lexend font-bold text-2xl">${letter} ${letter.toLowerCase()}</span>
                            <span class="text-[10px] text-gray-400 mt-1 font-medium">${exampleWords[index]}</span>
                        </div>
                    `);
                });
            </script>
</div>
<!-- Achievement/Banner Section -->
<section class="bg-[#2D333F] rounded-xl p-6 relative overflow-hidden shadow-lg">
<div class="relative z-10 flex flex-col gap-2">
<h4 class="text-white font-bold text-lg">学习新航向</h4>
<p class="text-white/70 text-sm flex items-center gap-2">
                    点击字母开启精彩视频，跟着外教老师大声读！
                </p>
</div>
<div class="absolute right-[-20px] bottom-[-20px] w-32 h-32 bg-white/5 rounded-full"></div>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-[80px] bg-white border-t border-gray-50 flex justify-around items-center px-6 pb-6 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
<div class="flex flex-col items-center justify-center text-gray-400 font-lexend text-[12px] font-medium active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl mb-1">home</span>
<span>首页</span>
</div>
<div class="flex flex-col items-center justify-center text-[#4F6EF2] font-lexend text-[12px] font-bold active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl mb-1">menu_book</span>
<span>拼读</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-400 font-lexend text-[12px] font-medium active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl mb-1">person</span>
<span>我的</span>
</div>
</nav>
</body></html>
